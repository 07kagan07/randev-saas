server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API isteklerini backend'e proxy'le
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # index.html — asla cache'leme (yeni deploy sonrası hemen güncel versiyon gelsin)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # React Router — tüm rotaları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — agresif cache (Vite hash ile üretildiği için güvenli)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
