version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: randevu2_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: randevu_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - randevu_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: randevu2_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - randevu_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: randevu2_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - randevu_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: randevu2_frontend
    restart: unless-stopped
    ports:
      - "5000:80"
    networks:
      - randevu_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: randevu2_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - randevu_net
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  randevu_net:
    driver: bridge
